version: "3.8"

services:
  prometheus:
    image: prom/prometheus:latest
    container_name: prometheus_server
    ports:
      - "8003:9090"
    volumes:
      - ./prometheus.yml:/etc/prometheus/prometheus.yml:ro,z
    extra_hosts:
      - "host.docker.internal:host-gateway"
    restart: unless-stopped

  grafana:
    image: grafana/grafana:latest
    container_name: grafana_server
    ports:
      - "8004:3000"
    environment:
      # 1. Allow Grafana to be rendered inside an iframe
      - GF_SECURITY_ALLOW_EMBEDDING=true
      # 2. Allow viewers to see the dashboard without logging in
      - GF_AUTH_ANONYMOUS_ENABLED=true
      - GF_AUTH_ANONYMOUS_ORG_ROLE=Viewer
      # 3. Force the default theme to be dark (black/dark grey background)
      - GF_USERS_DEFAULT_THEME=dark
    restart: unless-stopped
    volumes:
      - grafana_data:/var/lib/grafana
    depends_on:
      - prometheus

volumes:
  grafana_data:
